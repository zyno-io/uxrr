openapi: 3.0.3
info:
  title: '@zyno-io/uxrr-api'
  version: 0.1.2
paths:
  /v1/admin/apps:
    get:
      operationId: getAdminListApps
      tags:
        - admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppResponse'
    post:
      operationId: postAdminCreateApp
      tags:
        - admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAppBody'
  /v1/admin/apps/{appKey}:
    patch:
      operationId: patchAdminUpdateApp
      tags:
        - admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppResponse'
      parameters:
        - name: appKey
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAppBody'
    delete:
      operationId: deleteAdminDeactivateApp
      tags:
        - admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
      parameters:
        - name: appKey
          in: path
          required: true
          schema:
            type: string
  /v1/admin/users:
    get:
      operationId: getAdminListUsers
      tags:
        - admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
  /v1/admin/users/{id}:
    patch:
      operationId: patchAdminUpdateUser
      tags:
        - admin
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserBody'
  /v1/auth/config:
    get:
      operationId: getAuthGetConfig
      tags:
        - auth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthConfigResponse'
  /v1/auth/me:
    get:
      operationId: getAuthGetMe
      tags:
        - auth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
  /v1/auth/ws-token:
    post:
      operationId: postAuthGetWsToken
      tags:
        - auth
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                required:
                  - token
  /v1/ng/{appKey}/{sessionId}/data:
    post:
      operationId: postIngestIngestData
      tags:
        - ingest
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  ws:
                    type: boolean
                    enum:
                      - true
                  config:
                    type: object
                    properties:
                      maxIdleTimeout:
                        type: number
                      maxSessionDuration:
                        type: number
                required:
                  - ok
      parameters:
        - name: appKey
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestDataPayload'
  /v1/ng/{appKey}/{sessionId}/t:
    post:
      operationId: postIngestIngestOtlpTraces
      tags:
        - ingest
      responses:
        '200':
          description: OK
      parameters:
        - name: appKey
          in: path
          required: true
          schema:
            type: string
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
  /v1/sessions:
    get:
      operationId: getSessionListSessions
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ISession'
      parameters:
        - name: appKey
          in: query
          required: false
          schema:
            type: string
        - name: userId
          in: query
          required: false
          schema:
            type: string
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
        - name: to
          in: query
          required: false
          schema:
            type: string
        - name: hasChat
          in: query
          required: false
          schema:
            type: boolean
        - name: isLive
          in: query
          required: false
          schema:
            type: boolean
        - name: before
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: number
        - name: offset
          in: query
          required: false
          schema:
            type: number
  /v1/sessions/autocomplete/appKeys:
    get:
      operationId: getSessionAutocompleteAppKeys
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
  /v1/sessions/autocomplete/deviceIds:
    get:
      operationId: getSessionAutocompleteDeviceIds
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
  /v1/sessions/autocomplete/users:
    get:
      operationId: getSessionAutocompleteUsers
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    userId:
                      type: string
                    userName:
                      type: string
                    userEmail:
                      type: string
                  required:
                    - userId
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
  /v1/sessions/{id}:
    get:
      operationId: getSessionGetSession
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ISession'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
    delete:
      operationId: deleteSessionDeleteSession
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                required:
                  - ok
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /v1/sessions/{id}/events:
    get:
      operationId: getSessionGetSessionEvents
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IRrwebEvent'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: startChunk
          in: query
          required: false
          schema:
            type: number
        - name: endChunk
          in: query
          required: false
          schema:
            type: number
  /v1/sessions/{id}/logs:
    get:
      operationId: getSessionGetSessionLogs
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ILogEntry'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          schema:
            type: number
  /v1/sessions/{id}/chat:
    get:
      operationId: getSessionGetSessionChat
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IChatMessage'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /v1/sessions/{id}/share:
    post:
      operationId: postSessionCreateShareLink
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expiresAt:
                    type: string
                  id:
                    type: string
                required:
                  - token
                  - expiresAt
                  - id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
    delete:
      operationId: deleteSessionRevokeShareLink
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
    get:
      operationId: getSessionGetShareLink
      tags:
        - session
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  active:
                    type: boolean
                  token:
                    type: string
                  expiresAt:
                    type: string
                  createdAt:
                    type: string
                required:
                  - active
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /v1/shared/{token}:
    get:
      operationId: getShareGetSession
      tags:
        - share
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IShareSession'
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
  /v1/shared/{token}/events:
    get:
      operationId: getShareGetSessionEvents
      tags:
        - share
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: {}
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: startChunk
          in: query
          required: false
          schema:
            type: number
        - name: endChunk
          in: query
          required: false
          schema:
            type: number
  /v1/shared/{token}/logs:
    get:
      operationId: getShareGetSessionLogs
      tags:
        - share
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: {}
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
        - name: since
          in: query
          required: false
          schema:
            type: number
  /v1/shared/{token}/chat:
    get:
      operationId: getShareGetSessionChat
      tags:
        - share
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: {}
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
  /v1/api-keys:
    post:
      operationId: postApiKeyCreateKey
      tags:
        - apiKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  keyPrefix:
                    type: string
                  scope:
                    type: string
                  appKeys:
                    type: array
                    items:
                      type: string
                  isActive:
                    type: boolean
                  createdAt:
                    type: string
                  updatedAt:
                    type: string
                  key:
                    type: string
                required:
                  - id
                  - name
                  - keyPrefix
                  - scope
                  - appKeys
                  - isActive
                  - createdAt
                  - updatedAt
                  - key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyBody'
    get:
      operationId: getApiKeyListKeys
      tags:
        - apiKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
  /v1/api-keys/{id}:
    get:
      operationId: getApiKeyGetKey
      tags:
        - apiKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
    patch:
      operationId: patchApiKeyUpdateKey
      tags:
        - apiKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateApiKeyBody'
    delete:
      operationId: deleteApiKeyRevokeKey
      tags:
        - apiKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required:
                  - ok
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
  /v1/api-keys/sign:
    post:
      operationId: postApiKeySignToken
      tags:
        - apiKey
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                required:
                  - token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignTokenBody'
components:
  schemas:
    AppResponse:
      type: object
      properties:
        id:
          type: string
        appKey:
          type: string
        name:
          type: string
        origins:
          type: array
          items:
            type: string
        maxIdleTimeout:
          type: number
        maxSessionDuration:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - appKey
        - name
        - origins
        - isActive
        - createdAt
        - updatedAt
    CreateAppBody:
      type: object
      properties:
        appKey:
          type: string
        name:
          type: string
        origins:
          type: array
          items:
            type: string
        maxIdleTimeout:
          type: number
        maxSessionDuration:
          type: number
      required:
        - appKey
        - name
        - origins
    UpdateAppBody:
      type: object
      properties:
        name:
          type: string
        origins:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        maxIdleTimeout:
          type: number
          nullable: true
        maxSessionDuration:
          type: number
          nullable: true
    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        isAdmin:
          type: boolean
        lastLoginAt:
          type: string
        createdAt:
          type: string
      required:
        - id
        - email
        - isAdmin
        - lastLoginAt
        - createdAt
    UpdateUserBody:
      type: object
      properties:
        isAdmin:
          type: boolean
      required:
        - isAdmin
    AuthConfigResponse:
      type: object
      properties:
        oidc:
          allOf:
            - $ref: '#/components/schemas/OidcConfig'
          nullable: true
        grafana:
          allOf:
            - $ref: '#/components/schemas/GrafanaConfig'
          nullable: true
      required:
        - oidc
        - grafana
    OidcConfig:
      type: object
      properties:
        issuerUrl:
          type: string
        clientId:
          type: string
        scopes:
          type: string
      required:
        - issuerUrl
        - clientId
        - scopes
    GrafanaConfig:
      type: object
      properties:
        baseUrl:
          type: string
        datasource:
          type: string
      required:
        - baseUrl
        - datasource
    MeResponse:
      type: object
      properties:
        userId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        scope:
          type: string
        isAdmin:
          type: boolean
      required:
        - scope
        - isAdmin
    IngestDataPayload:
      type: object
      properties:
        identity:
          type: object
          properties:
            deviceId:
              type: string
            userId:
              type: string
            userName:
              type: string
            userEmail:
              type: string
        meta:
          type: object
          properties:
            version:
              type: string
            environment:
              type: string
            userAgent:
              type: string
        launchTs:
          type: number
        previousSessionId:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/RrwebEvent'
        logs:
          type: array
          items:
            $ref: '#/components/schemas/IngestLogEntry'
      required:
        - identity
        - meta
        - launchTs
    RrwebEvent:
      type: object
      properties:
        type:
          type: number
        data: {}
        timestamp:
          type: number
        delay:
          type: number
      required:
        - type
        - timestamp
    IngestLogEntry:
      type: object
      properties:
        t:
          type: number
        v:
          type: number
        c:
          type: string
        m:
          type: string
        d: {}
      required:
        - t
        - v
        - c
        - m
    ISession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        deviceId:
          type: string
        userId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        version:
          type: string
        environment:
          type: string
        userAgent:
          type: string
        ipAddress:
          type: string
        startedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        eventChunkCount:
          type: number
        eventBytesStored:
          type: number
        hasChatMessages:
          type: boolean
        previousSessionId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        allUserIds:
          type: array
          items:
            type: string
        isLive:
          type: boolean
      required:
        - id
        - appId
        - deviceId
        - startedAt
        - lastActivityAt
        - eventChunkCount
        - eventBytesStored
        - hasChatMessages
        - createdAt
        - updatedAt
        - allUserIds
        - isLive
    IRrwebEvent:
      type: object
      properties:
        type:
          type: number
        data: {}
        timestamp:
          type: number
        delay:
          type: number
      required:
        - type
        - timestamp
    ILogEntry:
      type: object
      properties:
        t:
          type: number
        v:
          type: number
        c:
          type: string
        m:
          type: string
        d: {}
        appKey:
          type: string
        deviceId:
          type: string
        userId:
          type: string
        sessionId:
          type: string
      required:
        - t
        - v
        - c
        - m
        - appKey
        - deviceId
        - sessionId
    IChatMessage:
      type: object
      properties:
        message:
          type: string
        from:
          type: string
        timestamp:
          type: number
      required:
        - message
        - from
        - timestamp
    IShareSession:
      type: object
      properties:
        id:
          type: string
          format: uuid
        appId:
          type: string
          format: uuid
        deviceId:
          type: string
        userId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        version:
          type: string
        environment:
          type: string
        userAgent:
          type: string
        ipAddress:
          type: string
        startedAt:
          type: string
          format: date-time
        lastActivityAt:
          type: string
          format: date-time
        eventChunkCount:
          type: number
        eventBytesStored:
          type: number
        hasChatMessages:
          type: boolean
        previousSessionId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        allUserIds:
          type: array
          items:
            type: string
        isLive:
          type: boolean
      required:
        - id
        - appId
        - deviceId
        - startedAt
        - lastActivityAt
        - eventChunkCount
        - eventBytesStored
        - hasChatMessages
        - createdAt
        - updatedAt
        - allUserIds
        - isLive
    CreateApiKeyBody:
      type: object
      properties:
        name:
          type: string
        scope:
          type: string
          enum:
            - readonly
            - interactive
        appKeys:
          type: array
          items:
            type: string
      required:
        - name
        - scope
        - appKeys
    ApiKeyResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        scope:
          type: string
        appKeys:
          type: array
          items:
            type: string
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - keyPrefix
        - scope
        - appKeys
        - isActive
        - createdAt
        - updatedAt
    UpdateApiKeyBody:
      type: object
      properties:
        name:
          type: string
        scope:
          type: string
          enum:
            - readonly
            - interactive
        appKeys:
          type: array
          items:
            type: string
        isActive:
          type: boolean
    SignTokenBody:
      type: object
      properties:
        exp:
          type: number
        scope:
          type: string
          enum:
            - readonly
            - interactive
        apps:
          type: array
          items:
            type: string
        sid:
          type: string
      required:
        - exp
        - scope
        - apps
